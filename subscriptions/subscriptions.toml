# =============================================================================
# Crawled Sites (for sites without RSS)
# =============================================================================

[[sites]]
name = "HumanLayer Blog"
url = "https://www.humanlayer.dev/blog"
enabled = true
max_posts = 20
explore = false

[sites_defaults]
max_posts = 30
timeout = 120
headless = true
explore = false

# =============================================================================
# Hacker News
# =============================================================================

[hackernews]
enabled = true
top_n = 30              # Number of top stories to fetch
min_comments = 30       # Minimum comments to include a story
window_hours = 6        # Initial time window for API requests

